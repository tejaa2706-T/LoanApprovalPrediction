{% extends "base.html" %}

{% block title %}
Profile
{% endblock %}

{% block content %}

<div class="container">

<div class="row justify-content-center">

<div class="col-md-8">

<div class="card shadow-lg">

<div class="card-header bg-primary text-white">

<h3>👤 User Profile</h3>

</div>

<div class="card-body">

<table class="table table-bordered">

<tr>
<th>Full Name</th>
<td>{{ user.fullname }}</td>
</tr>

<tr>
<th>Email</th>
<td>{{ user.email }}</td>
</tr>

<tr>
<th>Username</th>
<td>{{ user.username }}</td>
</tr>

</table>

<a href="{{ url_for('dashboard') }}"
class="btn btn-primary">

Back to Dashboard

</a>

</div>

</div>

</div>

</div>

</div>

{% endblock %}
